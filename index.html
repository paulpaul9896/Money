        window.firebaseInitPromise = (async () => {

        window.setDoc = setDoc; window.getDoc = getDoc; window.doc = doc; window.collection = collection; window.onSnapshot = onSnapshot; window.deleteDoc = deleteDoc;

                        <select id="currFrom" class="w-full px-2 py-2 bg-slate-100 dark:bg-slate-700 border-none rounded-b-[1rem] text-xs font-bold text-center dark:text-white outline-none" onchange="window.calcCurrencyPage()">

                            <option value="HKD" selected>HKD (港幣)</option><option value="JPY">JPY (日圓)</option><option value="USD">USD (美元)</option><option value="TWD">TWD (台幣)</option><option value="EUR">EUR (歐元)</option><option value="CNY">CNY (人民幣)</option><option value="GBP">GBP (英鎊)</option>

                <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">主要貨幣兌港幣匯率</h4>
                <div class="overflow-hidden rounded-[1.5rem] border border-slate-100 dark:border-slate-700 shadow-sm">
                    <table class="w-full text-xs text-left">
                        <tbody id="currencyTableBody" class="divide-y divide-slate-100 dark:divide-slate-700 bg-white dark:bg-slate-800">

    <script>
        // --- 核心數據設定 ---
        const STORAGE_KEYS = ['my_expense_data', 'my_split_events', 'my_custom_categories', 'my_recurring_data', 'my_salary_data', 'my_budget', 'my_last_backup_pwd'];
        window.expenses = JSON.parse(localStorage.getItem('my_expense_data')) || [];
        window.splitEvents = JSON.parse(localStorage.getItem('my_split_events')) || [];
        window.customCategories = JSON.parse(localStorage.getItem('my_custom_categories')) || ['餐飲', '交通', '購物', '娛樂', '醫療', '日常'];
        window.recurringExpenses = JSON.parse(localStorage.getItem('my_recurring_data')) || [];
        window.userSalary = JSON.parse(localStorage.getItem('my_salary_data')) || { monthly: 0, yearly: 0 };
        window.monthlyBudget = parseFloat(localStorage.getItem('my_budget')) || 0; 

        window.currentEventId = null;
        window.expenseFilter = 'month'; 
        window.calendarDate = new Date();
        window.selectedDateStr = new Date().toDateString();
        window.splitCalendarDate = new Date();
        window.currentSplitDateStr = new Date().toDateString();
        window.splitDetailTab = 'overview'; 
        window.splitViewMode = 'all'; 
        window.unsubscribeCloud = null; 
        
        window.currentType = 'expense';
        window.currentRecType = 'expense';
        window.sections = {};
        window.myChart = null;
        window.confirmAction = null;
        window.personalForeignText = ""; 
        window.splitForeignText = ""; 
        window.html5QrCode = null;
        window.inputCallback = null;
        
        // 匯率全域數據
        window.rawRates = { HKD: 1, USD: 0.128, JPY: 19.5, TWD: 4.1, EUR: 0.118, CNY: 0.92, GBP: 0.1 };
        window.liveRates = { JPY: 0.052, TWD: 0.24, USD: 7.82, EUR: 8.4, CNY: 1.08 }; 

        // --- 自訂輸入框與模態框 ---
        window.showInputModal = function(title, desc, placeholder, defaultVal, type, onOk) {
            const m = document.getElementById('inputModal');
            document.getElementById('inputTitle').innerText = title;
            document.getElementById('inputDesc').innerText = desc;
            const field = document.getElementById('inputField');
            field.type = type || 'text'; field.placeholder = placeholder || ''; field.value = defaultVal || '';
            window.inputCallback = onOk;
            m.classList.remove('hidden'); m.classList.add('flex'); document.body.classList.add('modal-locked');
            setTimeout(() => m.style.opacity = "1", 10);
            setTimeout(() => field.focus(), 300);
        };
        window.closeInputModal = function() {
            const m = document.getElementById('inputModal'); m.style.opacity = "0"; document.body.classList.remove('modal-locked');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
        };
        window.submitInputModal = function() {
            const val = document.getElementById('inputField').value;
            window.closeInputModal(); if(window.inputCallback) window.inputCallback(val);
        };

        window.showToast = function(msg) { const t = document.getElementById('toast'); if(t) { t.innerText = msg; t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 3000); } };
        window.askConfirm = function(title, text, onOk) { const m = document.getElementById('confirmModal'); document.getElementById('confirmTitle').innerText = title; document.getElementById('confirmText').innerText = text; m.classList.remove('hidden'); m.classList.add('flex'); document.body.classList.add('modal-locked'); setTimeout(() => m.style.opacity = "1", 10); window.confirmAction = onOk; };
        window.closeConfirm = function(executed) { const m = document.getElementById('confirmModal'); m.style.opacity = "0"; document.body.classList.remove('modal-locked'); setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300); if(executed && window.confirmAction) window.confirmAction(); window.confirmAction = null; };
        window.toggleDataModal = function(show) { const m = document.getElementById('dataModal'); if(show) { m.classList.remove('hidden'); m.classList.add('flex'); setTimeout(() => m.style.opacity = "1", 10); } else { m.style.opacity = "0"; setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300); } };
        
        window.switchTab = function(mode) { 
            Object.keys(window.sections).forEach(k => { if(window.sections[k]) window.sections[k].classList.add('hidden'); }); 
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('text-slate-400'); b.style.background="transparent"; }); 
            const btn = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1)); 
            if(btn) { btn.classList.add('active'); btn.classList.remove('text-slate-400'); } 
            if(window.sections[mode]) window.sections[mode].classList.remove('hidden'); 
        };
        window.toggleDarkMode = function() { document.documentElement.classList.toggle('dark'); const isDark = document.documentElement.classList.contains('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); document.getElementById('darkModeIcon').innerText = isDark ? '☀️' : '🌙'; };
        
        // --- 匯率換算邏輯 ---
        window.fetchExchangeRates = async function() { 
            try { 
                const res = await fetch('https://open.er-api.com/v6/latest/HKD'); 
                const data = await res.json(); 
                if (data && data.rates) { 
                    window.rawRates = data.rates;
                    window.liveRates.JPY = 1 / data.rates.JPY; 
                    window.liveRates.TWD = 1 / data.rates.TWD; 
                    window.liveRates.USD = 1 / data.rates.USD; 
                    window.liveRates.EUR = 1 / data.rates.EUR; 
                    window.liveRates.CNY = 1 / data.rates.CNY; 
                } 
            } catch (e) { console.warn("無法取得即時匯率"); }
            window.renderCurrencyTable();
            window.calcCurrencyPage();
        };

        window.calcCurrencyPage = function() {
            const from = document.getElementById('currFrom').value;
            const to = document.getElementById('currTo').value;
            const amt = parseFloat(document.getElementById('currFromAmt').value) || 0;
            if(!window.rawRates[from] || !window.rawRates[to]) return;
            const inHKD = amt / window.rawRates[from];
            const result = inHKD * window.rawRates[to];
            document.getElementById('currToAmt').value = result.toFixed(2);
        };

        window.renderCurrencyTable = function() {
            const tbody = document.getElementById('currencyTableBody');
            if(!tbody) return;
            
            const currencies = [
                { c: 'USD', label: '1 USD (美元)', mult: 1 },
                { c: 'JPY', label: '100 JPY (日圓)', mult: 100 },
                { c: 'CNY', label: '1 CNY (人民幣)', mult: 1 },
                { c: 'GBP', label: '1 GBP (英鎊)', mult: 1 },
                { c: 'EUR', label: '1 EUR (歐元)', mult: 1 },
                { c: 'TWD', label: '100 TWD (台幣)', mult: 100 },
                { c: 'KRW', label: '1000 KRW (韓圜)', mult: 1000 },
                { c: 'AUD', label: '1 AUD (澳幣)', mult: 1 }
            ];
            
            let html = '';
            currencies.forEach(item => {
                if(window.rawRates[item.c]) {
                    const hkdValue = (item.mult / window.rawRates[item.c]).toFixed(3);
                    html += `<tr><td class="px-5 py-4 font-bold dark:text-slate-200">${item.label}</td><td class="px-5 py-4 text-right font-black text-sky-500">${hkdValue} HKD</td></tr>`;
                }
            });
            tbody.innerHTML = html;
        };

        // --- 全機備份邏輯 ---
        window.saveToData = function() { localStorage.setItem('my_expense_data', JSON.stringify(window.expenses)); localStorage.setItem('my_split_events', JSON.stringify(window.splitEvents)); localStorage.setItem('my_recurring_data', JSON.stringify(window.recurringExpenses)); localStorage.setItem('my_salary_data', JSON.stringify(window.userSalary)); localStorage.setItem('my_custom_categories', JSON.stringify(window.customCategories)); localStorage.setItem('my_budget', window.monthlyBudget.toString()); };
        window.handleCloudBackup = async function() { if(!window.isCloudReady) return window.showToast("雲端尚未就緒 ☁️"); window.toggleDataModal(false); const oldPwd = localStorage.getItem('my_last_backup_pwd') || ""; window.showInputModal("雲端備份", "請設定「備份密碼」\n(相同密碼自動覆蓋，新密碼自動刪除舊檔)", "例如: backup123", oldPwd, "text", async (pwd) => { if(!pwd || pwd.trim().length < 4) return window.showToast("代碼過短，備份取消"); window.showToast("正在上傳並清理雲端..."); const fullPackage = { id: pwd.trim(), timestamp: Date.now(), data: {} }; STORAGE_KEYS.forEach(key => fullPackage.data[key] = localStorage.getItem(key)); try { if (oldPwd && oldPwd !== pwd.trim()) { try { await window.deleteDoc(window.doc(window.db, "artifacts", window.appId, "public", "data", "fullBackups", oldPwd)); } catch(err) {} } await window.setDoc(window.doc(window.db, "artifacts", window.appId, "public", "data", "fullBackups", pwd.trim()), fullPackage); localStorage.setItem('my_last_backup_pwd', pwd.trim()); window.showToast("✅ 備份成功！已覆蓋/更新雲端檔"); } catch(e) { window.showToast("❌ 備份失敗，請稍後再試"); } }); };

        window.renderCalendar = function() { const c = document.getElementById('calendarDays'); if(!c) return; const y = window.calendarDate.getFullYear(), m = window.calendarDate.getMonth(); document.getElementById('yearSelect').value = y; document.getElementById('monthSelect').value = m; c.innerHTML = ''; const f = new Date(y, m, 1).getDay(), dInM = new Date(y, m + 1, 0).getDate(); for (let i = 0; i < f; i++) c.innerHTML += `<div></div>`; for (let d = 1; d <= dInM; d++) { const ds = new Date(y, m, d).toDateString(); let net = window.expenses.filter(e => e.dateStr === ds).reduce((s, i) => s + (i.type === 'income' ? i.amount : -i.amount), 0); window.recurringExpenses.forEach(r => { const rd = new Date(r.date); const isInc = r.type === 'income'; if (r.freq === 'yearly') { if (rd.getMonth() === m && rd.getDate() === d && rd.getFullYear() <= y) net += (isInc ? r.amount : -r.amount); } else { if (rd.getDate() === d && rd <= new Date(y,m,d)) net += (isInc ? r.amount : -r.amount); } }); const div = document.createElement('div'); div.className = `calendar-day hover:bg-sky-50 dark:hover:bg-slate-800 ${ds === window.selectedDateStr ? 'selected' : ''} ${ds === new Date().toDateString() ? 'is-today' : ''}`; div.onclick = () => { window.selectedDateStr = ds; window.updateTargetDateUI(); window.renderCalendar(); window.renderPersonalApp(); }; let sumHTML = net !== 0 ? `<span class="text-[7px] font-black mt-1 ${net > 0 ? (ds === window.selectedDateStr ? 'text-white' : 'text-emerald-500') : (ds === window.selectedDateStr ? 'text-white' : 'text-red-500')}">${net > 0 ? '+' : ''}${Math.round(net)}</span>` : ''; div.innerHTML = `<span>${d}</span>${sumHTML}`; c.appendChild(div); } };

            else { reportSec.classList.add('hidden'); fl.forEach(i => { if(i.type === 'expense') totalExp += i.amount; }); fr.forEach(r => { if(r.type !== 'income') totalExp += r.amount; }); }
            fl.forEach(item => { const isInc = item.type === 'income'; net += isInc ? item.amount : -item.amount; const div = document.createElement('div'); div.className = "glass-card p-6 rounded-[2rem] flex justify-between items-center border border-white dark:border-slate-800 animate-pop shadow-sm"; div.innerHTML = `<div><p class="font-black text-slate-800 dark:text-white text-sm">${item.category}${item.foreignText ? `<span class="text-[10px] text-slate-400 font-normal ml-1 border px-1.5 py-0.5 rounded-lg bg-slate-50 dark:bg-slate-700/50">(${item.foreignText})</span>` : ''}</p><p class="text-[9px] text-slate-400 font-bold uppercase mt-1">${item.dateStr}</p></div><div class="text-right"><p class="font-black text-lg ${isInc?'text-emerald-500':'text-red-500'}">${isInc?'+':'-'}$${item.amount.toFixed(2)}</p><div class="flex gap-2 justify-end mt-1"><button onclick="window.editExpense(${item.id})" class="text-slate-400 text-[8px] font-black uppercase">Edit</button><button onclick="window.deleteExpense(${item.id})" class="text-red-300 text-[8px] font-black uppercase">Del</button></div></div>`; list.appendChild(div); });
            fr.forEach(r => { const isInc = r.type === 'income'; const amt = (window.expenseFilter === 'year' && r.freq === 'monthly') ? r.amount * 12 : r.amount; net += isInc ? amt : -amt; const div = document.createElement('div'); div.className = "glass-card p-6 rounded-[2rem] flex justify-between items-center bg-amber-50/20 dark:bg-slate-800/80 shadow-sm border border-transparent dark:border-slate-700"; div.innerHTML = `<div><p class="font-black ${isInc?'text-emerald-600 dark:text-emerald-400':'text-amber-700 dark:text-amber-500'} text-sm">🔄 ${r.name}</p><p class="text-[9px] ${isInc?'text-emerald-400 dark:text-emerald-600':'text-amber-400 dark:text-amber-700'} font-bold uppercase mt-1">${r.date} (${r.freq === 'monthly'?'每月':'每年'})</p></div><div class="text-right"><p class="font-black text-lg ${isInc?'text-emerald-500':'text-red-500'}">${isInc?'+':'-'}$${amt.toFixed(2)}</p></div>`; list.appendChild(div); });

            window.splitViewMode = mode; 
            window.renderSplitCalendar(); 
            window.renderEventItemsListOnly(); 
            
            const btnAll = document.querySelector('button[onclick="window.setSplitView(\'all\')"]');
            const btnDay = document.querySelector('button[onclick="window.setSplitView(\'day\')"]');
            if(btnAll && btnDay) {
                if (window.splitViewMode === 'all') {
                    btnAll.className = "flex-1 py-3 rounded-2xl text-[10px] font-black uppercase bg-emerald-500 text-white border-transparent shadow-sm transition-all";
                    btnDay.className = "flex-1 py-3 rounded-2xl text-[10px] font-black uppercase bg-white dark:bg-slate-800 text-slate-400 border border-slate-200 dark:border-slate-700 shadow-sm transition-all";
                } else {
                    btnDay.className = "flex-1 py-3 rounded-2xl text-[10px] font-black uppercase bg-emerald-500 text-white border-transparent shadow-sm transition-all";
                    btnAll.className = "flex-1 py-3 rounded-2xl text-[10px] font-black uppercase bg-white dark:bg-slate-800 text-slate-400 border border-slate-200 dark:border-slate-700 shadow-sm transition-all";
                }
            }
        };

        window.renderSplitCalendar = function() { const event = window.splitEvents.find(e => e.id === window.currentEventId), c = document.getElementById('splitCalendarDays'), md = document.getElementById('splitMonthDisplay'); if(!c || !event) return; const y = window.splitCalendarDate.getFullYear(), m = window.splitCalendarDate.getMonth(); md.innerText = `${y}年 ${m + 1}月`; c.innerHTML = ''; const f = new Date(y, m, 1).getDay(), dInM = new Date(y, m + 1, 0).getDate(); for (let i = 0; i < f; i++) c.innerHTML += `<div></div>`; for (let d = 1; d <= dInM; d++) { const ds = new Date(y, m, d).toDateString(); let net = (event.items || []).filter(i => new Date(i.date).toDateString() === ds).reduce((sum, i) => sum + i.amount, 0); const div = document.createElement('div'); div.className = `calendar-day hover:bg-emerald-50 dark:hover:bg-slate-800 ${ds === window.currentSplitDateStr && window.splitViewMode === 'day' ? 'split-selected' : ''}`; div.onclick = () => { window.currentSplitDateStr = ds; window.splitViewMode = 'day'; window.renderSplitCalendar(); window.renderEventItemsListOnly(); }; let sumHTML = net !== 0 ? `<span class="text-[7px] font-black mt-0.5 ${ds === window.currentSplitDateStr && window.splitViewMode === 'day' ? 'text-white' : 'text-red-500'}">$${Math.round(net)}</span>` : ''; div.innerHTML = `<span class="${ds === window.currentSplitDateStr && window.splitViewMode === 'day' ? '' : 'text-slate-600'}">${d}</span>${sumHTML}`; c.appendChild(div); } };
        
        window.addItemToEvent = async function() { let d = document.getElementById('itemDesc').value.trim() || '共同開支'; const a = parseFloat(document.getElementById('itemAmount').value), p = document.getElementById('itemPayer').value, dateVal = document.getElementById('itemDate').value, pts = Array.from(document.querySelectorAll('input[name="part_check"]:checked')).map(i => i.value), editId = document.getElementById('editingSplitItemId')?.value; if(!a || a <= 0 || pts.length === 0) return window.showToast("資料不全"); if (window.splitForeignText) d += ` (${window.splitForeignText})`; const event = window.splitEvents.find(e => e.id === window.currentEventId); if(editId) { const idx = event.items.findIndex(i => i.id == editId); if(idx !== -1) { event.items[idx] = { id: Number(editId), desc: d, amount: a, payer: p, participants: pts, date: dateVal }; } } else { event.items.unshift({ id: Date.now(), desc: d, amount: a, payer: p, participants: pts, date: dateVal }); } if(event.isCloud && window.db) { try { await window.setDoc(window.doc(window.db, "artifacts", window.appId, "public", "data", "splitEvents", String(event.id)), event); } catch(e) {} } window.saveToData(); window.splitForeignText = ""; window.resetSplitForm(); window.renderSplitCalendar(); window.renderEventItemsListOnly(); window.showToast(editId ? "已修改紀錄 ✨" : "已入帳 💰"); };
        window.resetSplitForm = function() { document.getElementById('itemDesc').value = ''; document.getElementById('itemAmount').value = ''; document.getElementById('itemDate').valueAsDate = new Date(); document.querySelectorAll('input[name="part_check"]').forEach(cb => cb.checked = true); const editIdField = document.getElementById('editingSplitItemId'); if(editIdField) editIdField.value = ''; const addBtn = document.getElementById('addSplitBtn'); if(addBtn) addBtn.innerText = "確定入帳"; const cancelBtn = document.getElementById('cancelSplitEditBtn'); if(cancelBtn) cancelBtn.classList.add('hidden'); const disp = document.getElementById('splitForeignDisplay'); if(disp) { disp.innerText = ""; disp.classList.add('hidden'); } };
        window.editSplitItem = function(itemId) { const event = window.splitEvents.find(e => e.id === window.currentEventId); if (!event) return; const item = event.items.find(i => i.id === itemId); if (!item) return; document.getElementById('itemDesc').value = item.desc; document.getElementById('itemAmount').value = item.amount; document.getElementById('itemPayer').value = item.payer; document.getElementById('itemDate').value = item.date || new Date().toISOString().split('T')[0]; document.querySelectorAll('input[name="part_check"]').forEach(cb => { cb.checked = item.participants.includes(cb.value); }); document.getElementById('editingSplitItemId').value = item.id; document.getElementById('addSplitBtn').innerText = "確認修改"; document.getElementById('cancelSplitEditBtn').classList.remove('hidden'); document.getElementById('itemDesc').scrollIntoView({ behavior: 'smooth', block: 'center' }); };
        window.deleteSplitItem = function(itemId) { window.askConfirm("刪除此紀錄？", "此操作無法復原。", async () => { const event = window.splitEvents.find(e => e.id === window.currentEventId); if(!event) return; event.items = event.items.filter(i => i.id !== itemId); if(event.isCloud && window.db) { try { await window.setDoc(window.doc(window.db, "artifacts", window.appId, "public", "data", "splitEvents", String(event.id)), event); } catch(e) {} } window.saveToData(); window.renderSplitCalendar(); window.renderEventItemsListOnly(); window.showToast("已刪除 🗑️"); }); };
        window.editEventName = function() { const event = window.splitEvents.find(e => e.id === window.currentEventId); if (!event) return; window.showInputModal("修改計畫", "請輸入新的計畫名稱", "計畫標題", event.name, "text", (newName) => { if (newName && newName.trim()) { event.name = newName.trim(); if(event.isCloud && window.db) window.setDoc(window.doc(window.db, "artifacts", window.appId, "public", "data", "splitEvents", String(event.id)), event); window.saveToData(); window.openEventDetail(window.currentEventId); } }); };
        window.copyId = function(id) { const el = document.createElement('textarea'); el.value = id; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); window.showToast("ID 已複製 ✨"); };
        window.exportSettlementImage = function() { const node = document.getElementById('eventSettlement'); if(!node) return; window.showToast("生成圖片中..."); html2canvas(node, { backgroundColor: "#ffffff", scale: 2 }).then(canvas => { const link = document.createElement('a'); link.download = `Settlement.png`; link.href = canvas.toDataURL(); link.click(); window.showToast("已下載 ✨"); }); };

        window.startApp = function() {
            window.sections = { expense: document.getElementById('sectionExpense'), recurring: document.getElementById('sectionRecurring'), split: document.getElementById('sectionSplit'), currency: document.getElementById('sectionCurrency') };
            const ys = document.getElementById('yearSelect'), ms = document.getElementById('monthSelect'), curY = new Date().getFullYear();
            for(let i = curY - 5; i <= curY + 5; i++) { ys.innerHTML += `<option value="${i}">${i}年</option>`; }
            for(let i = 0; i < 12; i++) { ms.innerHTML += `<option value="${i}">${i+1}月</option>`; }
            ys.value = window.calendarDate.getFullYear(); ms.value = window.calendarDate.getMonth();
            const mIn = document.getElementById('monthlySalaryInput'), yIn = document.getElementById('yearlySalaryInput');
            if(mIn) mIn.value = window.userSalary.monthly || ""; if(yIn) yIn.value = window.userSalary.yearly || "";
            
            window.updateTargetDateUI(); window.renderPersonalApp(); window.renderRecurringApp(); window.renderEventList(); window.renderCalendar(); window.refreshCategoryOptions(); window.fetchExchangeRates();
            const urlParams = new URLSearchParams(window.location.search), joinId = urlParams.get('join');
            if (joinId) { window.history.replaceState({}, document.title, window.location.pathname); window.switchTab('split'); document.getElementById('cloudIdInput').value = joinId; setTimeout(() => { window.askConfirm("加入計畫？", `代碼 ${joinId}`, () => window.joinCloudEvent(joinId)); }, 1000); }
        };
        window.startApp();
    </script>
</body>
</html>
