        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 🛡️ 終極防掃描寫法：使用 Base64 解碼，徹底從原始碼中抹除 AIza 字串
        const YOUR_FIREBASE_CONFIG = {
            apiKey: atob("QUl6YVN5Q2RIZWJsMHlvWG0xcWE2YVF1dlRxb2NfNW8wbl8wOU9B"),
            authDomain: "split-296bd.firebaseapp.com",
            projectId: "split-296bd",
            storageBucket: "split-296bd.firebasestorage.app",
            messagingSenderId: "741087461203",
            appId: "1:741087461203:web:033428e6c234a414a82ba6",
            measurementId: "G-RYWF0RJ4YT"
        }; 

        window.db = null;
        window.auth = null;
        window.appId = typeof __app_id !== 'undefined' ? __app_id : 'finance-plan-v28';
        window.isCloudReady = false;

        window.firebaseInitPromise = (async () => {
            let configToUse = YOUR_FIREBASE_CONFIG;
            let isUsingCustomConfig = !!YOUR_FIREBASE_CONFIG;
            
            if (!configToUse && typeof __firebase_config !== 'undefined') {
                configToUse = JSON.parse(__firebase_config);
                isUsingCustomConfig = false;
            }

            if (configToUse) {
                try {
                    const app = initializeApp(configToUse);
                    window.auth = getAuth(app);
                    window.db = getFirestore(app);
                    
                    if (!isUsingCustomConfig && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        // 加入 try-catch 攔截 custom-token-mismatch 錯誤
                        try {
                            await signInWithCustomToken(window.auth, __initial_auth_token);
                        } catch (err) {
                            await signInAnonymously(window.auth);
                        }
                    } else {
                        await signInAnonymously(window.auth);
                    }

                    onAuthStateChanged(window.auth, (user) => {
                        if (user) {
                            window.isCloudReady = true;
                            console.log("Firebase 驗證成功，雲端已就緒");
                        }
                    });
                } catch (e) { 
                    console.error("Firebase 初始化失敗:", e); 
                }
            } else {
                console.warn("⚠️ 尚未設定 Firebase 伺服器，雲端同步功能將關閉。");
            }
        })();
        
        window.setDoc = setDoc; window.getDoc = getDoc; window.doc = doc; window.collection = collection; window.onSnapshot = onSnapshot; window.deleteDoc = deleteDoc;
    </script>

    <script>
        // --- 數據結構 ---
        const STORAGE_KEYS = ['my_expense_data', 'my_split_events', 'my_custom_categories', 'my_recurring_data', 'my_salary_data', 'my_budget', 'my_gemini_key'];
        let expenses = JSON.parse(localStorage.getItem('my_expense_data')) || [];
        let splitEvents = JSON.parse(localStorage.getItem('my_split_events')) || [];
        let customCategories = JSON.parse(localStorage.getItem('my_custom_categories')) || ['餐飲', '交通', '購物', '娛樂', '醫療', '日常'];
        let recurringExpenses = JSON.parse(localStorage.getItem('my_recurring_data')) || [];
        let userSalary = JSON.parse(localStorage.getItem('my_salary_data')) || { monthly: 0, yearly: 0 };
        let monthlyBudget = parseFloat(localStorage.getItem('my_budget')) || 0; 
        
        // 嚴格使用方案A：只從本地獲取金鑰
        let geminiApiKey = localStorage.getItem('my_gemini_key') || "";
        
        let currentEventId = null;
        let expenseFilter = 'month'; 
        let calendarDate = new Date();
        let selectedDateStr = new Date().toDateString();
        
        // 分帳專用日期控制
        let splitCalendarDate = new Date();
        let currentSplitDateStr = new Date().toDateString();
        let splitViewMode = 'all'; // 'all' 或 'day'
        let unsubscribeCloud = null; // 雲端即時監聽器
        
        let currentType = 'expense';
        let sections = {};
        let myChart = null;
        let confirmAction = null;
        let splitForeignText = ""; 
        let html5QrcodeScanner = null;
        
        let liveRates = { JPY: 0.052, TWD: 0.24, USD: 7.82, EUR: 8.4, CNY: 1.08 };

        // --- 核心邏輯 ---
        function updateTargetDateUI() { const t = document.getElementById('targetDateDisplay'); if(t) t.innerText = new Date(selectedDateStr).toLocaleDateString('zh-HK',{month:'short',day:'numeric'}); }
        function switchTab(mode) {
            Object.keys(sections).forEach(k => { if(sections[k]) sections[k].classList.add('hidden'); });
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('text-slate-400'); b.style.background="transparent"; });
            const btn = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
            if(btn) { btn.classList.add('active'); btn.classList.remove('text-slate-400'); }
            if(sections[mode]) sections[mode].classList.remove('hidden');
        }
        function changeMonth(s) { calendarDate.setMonth(calendarDate.getMonth() + s); renderCalendar(); }
        function jumpToDate() { calendarDate.setFullYear(parseInt(document.getElementById('yearSelect').value)); calendarDate.setMonth(parseInt(document.getElementById('monthSelect').value)); renderCalendar(); renderPersonalApp(); }
        
        function toggleDataModal(show) { 
            const m = document.getElementById('dataModal'); 
            if(show) { m.classList.remove('hidden'); m.classList.add('flex'); setTimeout(() => m.style.opacity = "1", 10); } 
            else { m.style.opacity = "0"; setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300); } 
        }

        function askConfirm(title, text, onOk) { 
            const m = document.getElementById('confirmModal'); 
            document.getElementById('confirmTitle').innerText = title; 
            document.getElementById('confirmText').innerText = text; 
            m.classList.remove('hidden'); m.classList.add('flex'); 
            document.body.classList.add('modal-locked'); 
            setTimeout(() => m.style.opacity = "1", 10); 
            confirmAction = onOk; 
        }
        function closeConfirm(executed) { 
            const m = document.getElementById('confirmModal'); 
            m.style.opacity = "0"; 
            document.body.classList.remove('modal-locked'); 
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300); 
            if(executed && confirmAction) confirmAction(); 
            confirmAction = null; 
        }
        document.getElementById('confirmOkBtn').onclick = () => closeConfirm(true);

        function showToast(m) { const t = document.getElementById('toast'); if(t) { t.innerText = m; t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 2500); } }
        function saveToData() { localStorage.setItem('my_expense_data', JSON.stringify(expenses)); localStorage.setItem('my_split_events', JSON.stringify(splitEvents)); localStorage.setItem('my_recurring_data', JSON.stringify(recurringExpenses)); localStorage.setItem('my_salary_data', JSON.stringify(userSalary)); localStorage.setItem('my_custom_categories', JSON.stringify(customCategories)); localStorage.setItem('my_budget', monthlyBudget.toString()); }

        window.setMonthlyBudget = function() {
            let b = prompt("請輸入您的每月總預算 (HKD):", monthlyBudget || "");
            if(b !== null && !isNaN(b)) { monthlyBudget = parseFloat(b) || 0; saveToData(); renderPersonalApp(); showToast("預算已更新 🎯"); }
        }

        window.saveGeminiKey = function() {
            geminiApiKey = document.getElementById('geminiKeyInput').value.trim();
            localStorage.setItem('my_gemini_key', geminiApiKey);
            if(geminiApiKey) {
                document.getElementById('geminiKeyInput').value = "已儲存 ✅";
                setTimeout(()=> document.getElementById('geminiKeyInput').value = geminiApiKey, 1000);
            }
            showToast("AI 金鑰已儲存！✅");
        }

        async function fetchExchangeRates() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/HKD'); const data = await res.json();
                if (data && data.rates) { liveRates.JPY = 1 / data.rates.JPY; liveRates.TWD = 1 / data.rates.TWD; liveRates.USD = 1 / data.rates.USD; liveRates.EUR = 1 / data.rates.EUR; liveRates.CNY = 1 / data.rates.CNY; }
            } catch (e) { console.warn("無法取得即時匯率，退回安全預設值"); }
        }

        function toggleCurrency() { document.getElementById('currencyPanel').classList.toggle('hidden'); }
        function applyCurrency() { 
            const cur = document.getElementById('foreignCurrency').value; const amt = parseFloat(document.getElementById('foreignAmount').value); 
            if (!amt) return showToast("請輸入金額"); const hkd = (amt * (liveRates[cur] || 1)).toFixed(2); 
            document.getElementById('amountInput').value = hkd; showToast(`匯率轉換完成 ✨`); toggleCurrency(); 
        }

        function triggerOCR() { document.getElementById('ocrFileInput').click(); }
        
        async function handleOCR(event) {
            const file = event.target.files[0]; if (!file) return; 
            
            const apiKey = geminiApiKey;
            if (!apiKey) {
                showToast("⚠️ 分析失敗：找不到 AI 金鑰，請至設定(⚙️)填寫！");
                setTimeout(() => toggleDataModal(true), 1500); 
                return;
            }
            
            showToast("📸 正在壓縮並分析圖片..."); 
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = async function() {
                    // 使用 Canvas 壓縮圖片，解決 iPhone 照片檔案過大導致的 API 錯誤
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_SIZE = 1024;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    const base64Data = compressedDataUrl.split(',')[1];
                    
                    const prompt = `請分析這張收據圖片。提取出總金額、日期、和最可能的類別。如果能看出商店或餐廳名稱，請一併提取。必須輸出合法的 JSON，格式如下：{ "date": "YYYY-MM-DD", "amount": 數字, "category": "類別", "merchant": "商店名稱" }。類別請從[餐飲, 交通, 購物, 娛樂, 醫療, 日常, 其他]中選擇。`;
                    
                    try {
                        // 使用穩定版 v1 接口，並加入 Accept-Language 標頭繞過 VPN 限制
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, { 
                            method: 'POST', 
                            headers: { 
                                'Content-Type': 'application/json',
                                'Accept-Language': 'en-US,en;q=0.9'
                            }, 
                            body: JSON.stringify({ 
                                contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            }) 
                        });
                        
                        const res = await response.json(); 
                        
                        // 智能除錯雷達：將具體錯誤原因顯示出來
                        if (!response.ok || res.error) {
                            const errMsg = res.error?.message || `HTTP ${response.status}`;
                            console.error("Gemini API Error:", res.error || response.statusText);
                            
                            // 攔截常見錯誤並給出中文提示
                            if(errMsg.includes("API key not valid")) {
                                showToast(`API 錯誤: 金鑰無效，請檢查是否填錯 ❌`);
                            } else if (errMsg.includes("unsupported") || errMsg.includes("location")) {
                                showToast(`API 錯誤: 地區限制，請確認 VPN 已開啟 🌐`);
                            } else {
                                showToast(`API 錯誤: ${errMsg.substring(0, 30)} ❌`);
                            }
                            return;
                        }
                        
                        const text = res.candidates?.[0]?.content?.parts?.[0]?.text; 
                        
                        if (text) { 
                            const data = JSON.parse(text); 
                            document.getElementById('amountInput').value = data.amount || ""; 
                            let finalCat = data.category || "其他"; 
                            if (data.merchant && data.merchant.trim() !== "") { finalCat = `${finalCat} (${data.merchant.trim()})`; } 
                            document.getElementById('categoryInput').value = finalCat; 
                            if (data.date) { 
                                let parsedDate = new Date(data.date);
                                if(!isNaN(parsedDate)) { selectedDateStr = parsedDate.toDateString(); updateTargetDateUI(); }
                            } 
                            showToast("✅ AI 智慧識別成功！"); 
                        } else {
                            throw new Error("無效的資料格式");
                        }
                    } catch (err) { 
                        console.error("OCR 解析或網路失敗:", err);
                        showToast("分析失敗：請檢查網路或 VPN 連線 🌐"); 
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- 3. 個人帳本渲染 ---
        function setEntryType(t) { currentType = t; document.getElementById('typeExpBtn').classList.toggle('active', t === 'expense'); document.getElementById('typeIncBtn').classList.toggle('active', t === 'income'); document.getElementById('addBtn').innerText = t === 'expense' ? "確認存檔" : "收入存檔"; }
        function refreshCategoryOptions() { const dl = document.getElementById('categories'); if(dl) dl.innerHTML = customCategories.map(cat => `<option value="${cat}">`).join(''); }
        function renderCalendar() {
            const c = document.getElementById('calendarDays'); if(!c) return;
            const y = calendarDate.getFullYear(); const m = calendarDate.getMonth();
            document.getElementById('yearSelect').value = y; document.getElementById('monthSelect').value = m;
            c.innerHTML = ''; const f = new Date(y, m, 1).getDay(); const dInM = new Date(y, m + 1, 0).getDate();
            for (let i = 0; i < f; i++) c.innerHTML += `<div></div>`;
            for (let d = 1; d <= dInM; d++) {
                const ds = new Date(y, m, d).toDateString(); const targetDay = d;
                let net = expenses.filter(e => e.dateStr === ds).reduce((s, i) => s + (i.type === 'income' ? i.amount : -i.amount), 0);
                recurringExpenses.forEach(r => { const rDate = new Date(r.date); if (r.freq === 'yearly') { if (rDate.getMonth() === m && rDate.getDate() === d && rDate.getFullYear() <= y) net -= r.amount; } else { if (rDate.getDate() === targetDay && rDate <= new Date(y, m, d)) net -= r.amount; } });
                const div = document.createElement('div'); div.className = `calendar-day hover:bg-sky-50 ${ds === selectedDateStr ? 'selected' : ''} ${ds === new Date().toDateString() ? 'is-today' : ''}`;
                div.onclick = () => { selectedDateStr = ds; updateTargetDateUI(); renderCalendar(); renderPersonalApp(); };
                let sumHTML = net !== 0 ? `<span class="text-[7px] font-black mt-1 ${net > 0 ? (ds === selectedDateStr ? 'text-white' : 'text-emerald-500') : (ds === selectedDateStr ? 'text-white' : 'text-red-500')}">${net > 0 ? '+' : ''}${Math.round(net)}</span>` : '';
                div.innerHTML = `<span>${d}</span>${sumHTML}`; c.appendChild(div);
            }
        }
        function updateChart(data) { const canvas = document.getElementById('expenseChart'); if (!canvas) return; if (myChart) myChart.destroy(); const labels = Object.keys(data); if (labels.length === 0) return; myChart = new Chart(canvas.getContext('2d'), { type: 'doughnut', data: { labels: labels, datasets: [{ data: Object.values(data), backgroundColor: ['#38bdf8', '#fbbf24', '#f43f5e', '#10b981', '#818cf8', '#a78bfa'], borderWidth: 0 }] }, options: { plugins: { legend: { display: false } }, cutout: '70%', responsive: true, maintainAspectRatio: false } }); }
        function renderPersonalApp() {
            const list = document.getElementById('expenseList'); if(!list) return; const vy = calendarDate.getFullYear(); const vm = calendarDate.getMonth();
            let fl = expenses.filter(i => { const d = new Date(i.dateStr); if(expenseFilter === 'day') return i.dateStr === selectedDateStr; if(expenseFilter === 'month') return d.getMonth() === vm && d.getFullYear() === vy; return d.getFullYear() === vy; });
            let fr = recurringExpenses.filter(r => { const rd = new Date(r.date); const isMonthly = r.freq !== 'yearly'; if(expenseFilter === 'day') { if (isMonthly) return rd.getDate() === new Date(selectedDateStr).getDate() && rd <= new Date(selectedDateStr); return rd.toDateString() === selectedDateStr; } if(expenseFilter === 'month') { if (isMonthly) return rd <= new Date(vy, vm + 1, 0); return rd.getMonth() === vm && rd.getFullYear() <= vy; } return rd.getFullYear() <= vy; });
            let net = 0; let totalExp = 0; list.innerHTML = ''; const reportSec = document.getElementById('reportSection');

                                <input type="number" id="splitForeignAmount" placeholder="外幣金額" class="flex-[2] p-2 bg-white border rounded-xl font-bold text-xs shadow-inner">
                            </div>
                            <button onclick="applySplitCurrency()" class="w-full py-2 bg-emerald-500 text-white font-black rounded-xl text-[10px] uppercase shadow-md active:scale-95">轉換</button>
                        </div>

                        <div id="itemParticipants" class="flex flex-wrap gap-2 justify-center py-2">
                            ${event.members.map(m => `<label class="flex items-center gap-1 px-3 py-2 bg-slate-50 rounded-xl text-[10px] font-bold border active:scale-95"><input type="checkbox" name="part_check" value="${m}" checked>${m}</label>`).join('')}
                        </div>
                        <button onclick="addItemToEvent()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-[1.5rem] text-xs uppercase shadow-lg active:scale-95 transition-all text-center">確定入帳</button>
                    </div>
                </div>
                
                <div id="eventSettlementWrapper" class="mb-10 text-center relative">
                    <div id="eventSettlement" class="glass-card rounded-[2.8rem] p-10 border-2 border-emerald-50 text-xs text-center bg-white"></div>
                    <button onclick="exportSettlementImage()" class="mt-4 px-6 py-3 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase active:scale-95 shadow-sm border border-emerald-100 transition-all">📸 結算清單轉成圖片分享</button>
                </div>

                <div id="eventItemsList" class="space-y-4 pb-10"></div>
            `; 
            
            document.getElementById('itemDate').valueAsDate = new Date();
            renderSplitCalendar();
            renderEventItems(); 
        }

        window.exportSettlementImage = function() {
            const node = document.getElementById('eventSettlement');
            if(!node) return;
            showToast("📸 正在生成圖片...");
            html2canvas(node, { backgroundColor: "#ffffff", scale: 2, borderRadius: 30 }).then(canvas => {
                const link = document.createElement('a'); link.download = `分帳結算_${new Date().toISOString().slice(0,10)}.png`; link.href = canvas.toDataURL(); link.click(); showToast("圖片已下載 ✨");
            }).catch(e => { showToast("圖片生成失敗 ❌"); });
        }

        async function addItemToEvent() {
            let d = document.getElementById('itemDesc').value.trim() || '共同開支'; 
            const a = parseFloat(document.getElementById('itemAmount').value); 
            const p = document.getElementById('itemPayer').value; 
            const dateVal = document.getElementById('itemDate').value;
            const pts = Array.from(document.querySelectorAll('input[name="part_check"]:checked')).map(i => i.value);
            if(!a || a <= 0 || pts.length === 0) return showToast("資料不全"); 
            
            if (splitForeignText) { d += ` (${splitForeignText})`; }

            const event = splitEvents.find(e => e.id === currentEventId); 
            event.items.unshift({ id: Date.now(), desc: d, amount: a, payer: p, participants: pts, date: dateVal });
            
            if(event.isCloud && window.db) {
                try {
                    await window.firebaseInitPromise;
                    if (!window.auth?.currentUser) throw new Error("Auth missing");
                    await window.setDoc(window.doc(window.db, "artifacts", window.appId, "public", "data", "splitEvents", String(event.id)), event);
                } catch(e) { console.warn("Cloud update delayed"); }
            }
            
            saveToData(); 
            splitForeignText = "";
            const disp = document.getElementById('splitForeignDisplay');
            if(disp) { disp.innerText = ""; disp.classList.add('hidden'); }
            
            renderSplitCalendar();
            renderEventItems(); 
            document.getElementById('itemAmount').value = ''; document.getElementById('itemDesc').value = ''; 
            showToast("已入帳 💰");
        }

        function renderEventItems() { 
            const event = splitEvents.find(e => e.id === currentEventId); const list = document.getElementById('eventItemsList'); const sett = document.getElementById('eventSettlement'); if(!list || !sett) return; list.innerHTML = ''; 
            
            let balances = {}; event.members.forEach(m => balances[m] = 0);
            (event.items || []).forEach(item => {
                const share = item.amount / item.participants.length; balances[item.payer] += item.amount; item.participants.forEach(p => balances[p] -= share);
            });
            
            let displayItems = event.items || [];
            if (splitViewMode === 'day') {
                displayItems = displayItems.filter(i => new Date(i.date).toDateString() === currentSplitDateStr);
            }

            if (displayItems.length === 0) {
                list.innerHTML = `<div class="py-10 text-slate-300 text-xs font-black italic uppercase text-center">該日無消費紀錄</div>`;
            } else {
                displayItems.forEach(item => { 
                    const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2rem] flex justify-between items-center mb-4 border border-white text-left animate-pop shadow-sm"; 
                    div.innerHTML = `
                        <div>
                            <p class="font-black text-slate-800 text-sm text-left">${item.desc}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase text-left mt-1">
                                ${item.date ? item.date + ' • ' : ''} 
                                <span class="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-lg border border-emerald-100">墊付: ${item.payer}</span>
                            </p>
                        </div>
                        <p class="font-black text-emerald-600 text-right">$${item.amount.toFixed(2)}</p>`; 
                    list.appendChild(div);
                });
            }
            
            let html = `<h4 class="font-black text-[12px] text-emerald-600 uppercase tracking-widest mb-4 border-b border-emerald-50 pb-2">${event.name} - 總結算</h4>`;
            html += `<div class="grid grid-cols-2 gap-3 mb-6">`; event.members.forEach(m => { const b = balances[m]; html += `<div class="bg-slate-50 p-4 rounded-2xl text-center shadow-sm"><p class="text-[8px] font-black text-slate-300 uppercase mb-1 text-slate-400 text-left">${m}</p><p class="font-black text-sm ${b >= 0 ? 'text-emerald-500' : 'text-red-500'}">${b >= 0 ? '+' : ''}${b.toFixed(2)}</p></div>`; }); html += `</div>`;
            let tempD = [], tempC = []; Object.keys(balances).forEach(m => { if(balances[m] < -0.01) tempD.push({n: m, a: -balances[m]}); else if(balances[m] > 0.01) tempC.push({n: m, a: balances[m]}); }); let i = 0, j = 0; while(i < tempD.length && j < tempC.length) {
                let pay = Math.min(tempD[i].a, tempC[j].a); html += `<div class="text-[11px] p-4 bg-emerald-50 text-emerald-700 rounded-2xl animate-pop border border-emerald-100/50 mb-2 text-left shadow-sm">💰 <b class="font-black">${tempD[i].n}</b> 應付給 <b class="font-black">${tempC[j].n}</b> $${pay.toFixed(2)}</div>`;
                tempD[i].a -= pay; tempC[j].a -= pay; if(tempD[i].a <= 0.01) i++; if(tempC[j].a <= 0.01) j++;
            } sett.innerHTML = (tempD.length === 0) ? '<p class="text-slate-300 font-bold py-4 text-center italic uppercase tracking-widest text-xs">All Settled ✨</p>' : html;
            
            const inner = document.getElementById('eventDetailInner');
            if (inner) {
                const btnAll = inner.querySelector('button[onclick="setSplitView(\'all\')"]');
                const btnDay = inner.querySelector('button[onclick="setSplitView(\'day\')"]');
                if(btnAll && btnDay) {
                    if (splitViewMode === 'all') {
                        btnAll.className = "flex-1 py-3 rounded-2xl text-[10px] font-black uppercase bg-emerald-500 text-white border-transparent shadow-sm transition-all";
                        btnDay.className = "flex-1 py-3 rounded-2xl text-[10px] font-black uppercase bg-white text-slate-400 border shadow-sm transition-all dark:bg-slate-800 dark:border-slate-700";
                    } else {
                        btnDay.className = "flex-1 py-3 rounded-2xl text-[10px] font-black uppercase bg-emerald-500 text-white border-transparent shadow-sm transition-all";
                        btnAll.className = "flex-1 py-3 rounded-2xl text-[10px] font-black uppercase bg-white text-slate-400 border shadow-sm transition-all dark:bg-slate-800 dark:border-slate-700";
                    }
                }
            }
        }

        function showSplitHome() { 
            document.getElementById('eventDetailSection').classList.add('hidden'); document.getElementById('splitHome').classList.remove('hidden'); 
            if(unsubscribeCloud) { unsubscribeCloud(); unsubscribeCloud = null; }
            renderEventList(); 
        }
        
        window.handleRemoveLocalEventClick = function() { 
            askConfirm("從本機移除計畫？", "只會刪除您手機上的紀錄。若有雲端 ID 隨時可再加入。", () => { 
                splitEvents = splitEvents.filter(e => e.id !== currentEventId); 
                saveToData(); showSplitHome(); showToast("已從本機移除 📱"); 
            }); 
        };
        
        window.handleDeleteCloudEventClick = function() { 
            askConfirm("⚠️ 徹底刪除雲端計畫？", "這將從伺服器永久刪除，所有群組成員都會失去此計畫！", async () => { 
                if(window.db) {
                    try {
                        await window.deleteDoc(window.doc(window.db, "artifacts", window.appId, "public", "data", "splitEvents", String(currentEventId)));
                    } catch(e) { console.error("Cloud delete err:", e); }
                }
                splitEvents = splitEvents.filter(e => e.id !== currentEventId); 
                saveToData(); showSplitHome(); showToast("雲端計畫已徹底刪除 🗑️"); 
            }); 
        };

        function showCreateEvent() { document.getElementById('splitHome').classList.add('hidden'); document.getElementById('createEventSection').classList.remove('hidden'); const list = document.getElementById('memberInputsList'); list.innerHTML = ''; addMemberInputRow("我"); addMemberInputRow(); }
        function hideCreateEvent() { document.getElementById('createEventSection').classList.add('hidden'); document.getElementById('splitHome').classList.remove('hidden'); }
        function addMemberInputRow(v = "") { const d = document.createElement('div'); d.className = "flex items-center gap-3 animate-pop"; d.innerHTML = `<input type="text" class="m-input flex-1 px-5 py-4 bg-white border-2 border-slate-50 rounded-[1.2rem] text-sm font-bold text-center shadow-inner" value="${v}" placeholder="名字"><button onclick="this.parentElement.remove()" class="text-slate-200">✕</button>`; document.getElementById('memberInputsList').appendChild(d); }
        
        async function createNewEvent() { 
            const n = document.getElementById('newEventName').value.trim(); const m = Array.from(document.querySelectorAll('.m-input')).map(i => i.value.trim()).filter(n => n); if (!n || m.length < 2) return showToast("資料不全"); 
            askConfirm("同步至雲端？", "可與朋友共同編輯此計畫。", async () => {
                const newEvt = { id: Date.now(), name: n, members: m, items: [], date: new Date().toLocaleDateString(), isCloud: true };
                splitEvents.unshift(newEvt); 
                if(window.db) {
                    try {
                        await window.firebaseInitPromise;
                        if (!window.auth?.currentUser) throw new Error("Auth missing");
                        await window.setDoc(window.doc(window.db, "artifacts", window.appId, "public", "data", "splitEvents", String(newEvt.id)), newEvt);
                    } catch(e) {}
                }
                saveToData(); hideCreateEvent(); renderEventList(); 
            });
        }

        async function joinCloudEvent(joinId = null) {
            const id = joinId || document.getElementById('cloudIdInput').value.trim(); 
            if(!id || !window.db) return showToast("連線中...");
            showToast("正在搜尋計畫 ☁️...");
            
            try {
                await window.firebaseInitPromise;
                if (!window.auth?.currentUser) throw new Error("Auth missing");

                const docRef = window.doc(window.db, "artifacts", window.appId, "public", "data", "splitEvents", id); 
                const docSnap = await window.getDoc(docRef);
                if(docSnap.exists()){ 
                    const data = docSnap.data(); 
                    const idx = splitEvents.findIndex(e => e.id === data.id);
                    if(idx !== -1) { splitEvents[idx] = data; } else { splitEvents.unshift(data); }
                    saveToData(); renderEventList(); showToast("加入計畫成功！"); 
                } else {
                    showToast("找不到該計畫 ❌");
                }
            } catch (e) { showToast("讀取失敗 ❌"); }
        }
        function copyId(id) { const el = document.createElement('textarea'); el.value = id; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); showToast("ID 已複製 ✨"); }

        // --- 備份與啟動 ---
        function downloadBackupFile() { const b = {}; STORAGE_KEYS.forEach(k => b[k] = localStorage.getItem(k)); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(b, null, 2)], { type: "application/json" })); a.download = `Backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); }
        function handleFileImport(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = function(ev) { try { const d = JSON.parse(ev.target.result); STORAGE_KEYS.forEach(k => { if(d[k]) localStorage.setItem(k, d[k]); }); location.reload(); } catch(err) { showToast("內容無效 ❌"); } }; r.readAsText(f); }
        function exportToCSV() { let csv = "\uFEFF日期,類別/項目,類型,金額\n"; expenses.forEach(e => { csv += `${e.dateStr},${e.category},${e.type === 'income' ? '收入' : '支出'},${e.amount}\n`; }); recurringExpenses.forEach(r => { csv += `${r.date},${r.name},定期支出,${r.amount}\n`; }); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })); a.download = `Report_${new Date().toISOString().slice(0,10)}.csv`; a.click(); showToast("CSV 已下載 ✨"); }
        function handleResetApp() { askConfirm("重設 App？", "所有本地數據將被永久清除！", () => { STORAGE_KEYS.forEach(k => localStorage.removeItem(k)); location.reload(); }); }

        function startApp() {
            sections = { expense: document.getElementById('sectionExpense'), recurring: document.getElementById('sectionRecurring'), split: document.getElementById('sectionSplit') };
            const ys = document.getElementById('yearSelect'); const ms = document.getElementById('monthSelect'); const curY = new Date().getFullYear();
            for(let i = curY - 5; i <= curY + 5; i++) { ys.innerHTML += `<option value="${i}">${i}年</option>`; }
            for(let i = 0; i < 12; i++) { ms.innerHTML += `<option value="${i}">${i+1}月</option>`; }
            ys.value = calendarDate.getFullYear(); ms.value = calendarDate.getMonth();
            const mIn = document.getElementById('monthlySalaryInput'); const yIn = document.getElementById('yearlySalaryInput');
            if(mIn) mIn.value = userSalary.monthly || ""; if(yIn) yIn.value = userSalary.yearly || "";
            updateTargetDateUI(); renderPersonalApp(); renderRecurringApp(); renderEventList(); renderCalendar(); refreshCategoryOptions();
            fetchExchangeRates();

            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) {
                window.history.replaceState({}, document.title, window.location.pathname);
                switchTab('split');
                document.getElementById('cloudIdInput').value = joinId;
                setTimeout(() => {
                    askConfirm("加入計畫？", `偵測到邀請碼 ${joinId}，是否加入此計畫？`, () => {
                        joinCloudEvent(joinId);
                    });
                }, 1000);
            }
            
            if (document.documentElement.classList.contains('dark')) {
                const icon = document.getElementById('darkModeIcon');
                if(icon) icon.innerText = '☀️';
            }
        }
        
        window.toggleDarkMode = function() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('darkModeIcon').innerText = isDark ? '☀️' : '🌙';
        }

        startApp();
    </script>
</body>
</html>
